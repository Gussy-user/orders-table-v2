{% extends "base.html" %}
{% block title %}Список статусов{% endblock %}
{% block content %}
<h2>Статусы клиентов</h2>

<table class="table table-sm table-hover align-middle">
    <thead class="table-light"><tr><th>ID</th><th>Название</th><th>Действия</th></tr></thead>
    <tbody>
    {% for st in statuses %}
        <tr>
            <td>{{ st.id }}</td>
            <td>{{ st.name }}</td>
            <td>
                <form method="post" action="{{ url_for('main.status_list') }}" class="d-inline" style="margin:0;">
                    <input type="hidden" name="action" value="rename">
                    <input type="hidden" name="status_id" value="{{ st.id }}">
                    <div class="input-group input-group-sm">
                        <input type="text" name="new_name" class="form-control" placeholder="Новое имя" required>
                        <button class="btn btn-outline-primary" type="submit">✏️</button>
                    </div>
                </form>
                <form method="post" action="{{ url_for('main.status_list') }}" class="d-inline"
                      onsubmit="return confirm('Удалить статус {{ st.name }}?');">
                    <input type="hidden" name="action" value="delete">
                    <input type="hidden" name="status_id" value="{{ st.id }}">
                    <button class="btn btn-sm btn-outline-danger" type="submit">🗑️</button>
                </form>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>

<h5>Добавить статус</h5>
<form method="post" action="{{ url_for('main.status_list') }}" class="row g-3">
    <input type="hidden" name="action" value="add">
    <div class="col-auto">
        <input type="text" class="form-control" name="name" placeholder="Название статуса" required>
    </div>
    <div class="col-auto">
        <button type="submit" class="btn btn-success">Добавить</button>
    </div>
</form>
{% endblock %}
