{% extends "base.html" %}
{% block title %}{{ 'Редактировать' if car else 'Новый' }} автомобиль{% endblock %}
{% block content %}
<h2>{{ 'Редактировать' if car else 'Новый' }} автомобиль</h2>

<form method="post">
    <div class="mb-3">
        <label class="form-label" for="make">Марка</label>
        <input type="text" class="form-control" id="make" name="make"
               value="{{ car.make if car else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="model">Модель</label>
        <input type="text" class="form-control" id="model" name="model"
               value="{{ car.model if car else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="vin">VIN</label>
        <input type="text" class="form-control" id="vin" name="vin"
               value="{{ car.vin if car else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="year">Год выпуска (необязательно)</label>
        <input type="number" class="form-control" id="year" name="year"
               value="{{ car.year if car else '' }}">
    </div>
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{{ url_for('main.client_detail', client_id=client_id) }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
