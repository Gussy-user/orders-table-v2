{% extends "base.html" %}
{% block title %}{{ 'Редактировать' if part else 'Добавить' }} деталь{% endblock %}
{% block content %}
<h2>{{ 'Редактировать' if part else 'Добавить' }} деталь</h2>

<form method="post">
    <div class="mb-3">
        <label class="form-label" for="name">Наименование</label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ part.name if part else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="article">Артикул</label>
        <input type="text" class="form-control" id="article" name="article"
               value="{{ part.article if part and part.article else '' }}" placeholder="Артикул детали">
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label" for="purchase_price">Закупочная цена (руб.)</label>
            <input type="number" step="0.01" min="0" class="form-control" id="purchase_price" name="purchase_price"
                   value="{{ part.purchase_price if part and part.purchase_price else '0' }}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="price">Цена продажи (руб.)</label>
            <input type="number" step="0.01" min="0" class="form-control" id="price" name="price"
                   value="{{ part.price if part else '' }}" required>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label" for="location">Местоположение</label>
        <input type="text" class="form-control" id="location" name="location"
               value="{{ part.location if part else 'На складе' }}">
    </div>
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{{ url_for('warehouse.parts_list') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
