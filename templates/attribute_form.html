{% extends "base.html" %}
{% block title %}Редактировать атрибут{% endblock %}
{% block content %}
<h2>Редактировать атрибут</h2>
<form method="post">
    <div class="mb-3">
        <label class="form-label" for="new_name">Новое имя</label>
        <input type="text" class="form-control" id="new_name" name="new_name" value="{{ attribute.name }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{{ url_for('main.attribute_list') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
